name: Validate

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check for hardcoded secrets
        run: |
          FOUND=$(grep -rEn '(password|secret|api_key|apikey|token)\s*=\s*["\x27][^"\x27]+["\x27]' src/ --include='*.ts' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Hardcoded secrets detected:"
            echo "$FOUND"
            exit 1
          fi
          echo "No hardcoded secrets found."
