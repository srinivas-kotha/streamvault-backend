name: Deploy

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to VPS
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_wait_seconds: 30
          command: |
            which ssh-agent || sudo apt-get install -y openssh-client
            eval $(ssh-agent -s)
            echo "${{ secrets.SSH_KEY }}" | tr -d '\r' | ssh-add -
            mkdir -p ~/.ssh
            ssh-keyscan -t rsa ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
            ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            cd ~/streamvault-backend && git pull origin main
            cd ~/ai-orchestration && docker compose up -d --build streamvault-api

            echo "Waiting for health check..."
            for i in $(seq 1 18); do
              if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                echo "Health check passed after $((i * 5))s"
                exit 0
              fi
              echo "Waiting for health... attempt $i/18"
              sleep 5
            done
            echo "Health check failed after 90s — rolling back"
            cd ~/ai-orchestration && docker compose logs streamvault-api --tail 50
            docker compose restart streamvault-api
            exit 1
            DEPLOY_SCRIPT

      - name: Cleanup old images
        if: success()
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 3
          retry_wait_seconds: 15
          command: |
            eval $(ssh-agent -s)
            echo "${{ secrets.SSH_KEY }}" | tr -d '\r' | ssh-add -
            mkdir -p ~/.ssh
            ssh-keyscan -t rsa ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
            ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'docker image prune -f'
